name: Schedule TikTok Posts

on:
  push:
    paths:
      - 'clients/**/posts.csv'

jobs:
  schedule:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install TempoGears CLI
        run: npm install -g tiktok-tg

      - name: Authenticate with TempoGears
        run: |
          if [ -z "$TG_API_KEY" ]; then
            echo "Error: TG_API_KEY secret is not set in this repo."
            echo "Go to Settings → Secrets and variables → Actions → New repository secret"
            exit 1
          fi
          tg auth api-key "$TG_API_KEY"
        env:
          TG_API_KEY: ${{ secrets.TG_API_KEY }}

      - name: Find changed CSVs
        id: changed
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD | grep 'posts.csv' | tr '\n' ' ' || true)
          echo "files=$CHANGED" >> $GITHUB_OUTPUT
          echo "Changed files: $CHANGED"

      - name: Download videos and schedule posts
        run: |
          python3 << 'PYEOF'
          import csv, os, subprocess, sys

          changed = "${{ steps.changed.outputs.files }}".strip().split()

          for csv_path in changed:
            client_dir = os.path.dirname(csv_path)
            client_name = os.path.basename(client_dir)
            print(f"\n{'─'*40}")
            print(f"Processing client: {client_name}")
            print(f"{'─'*40}")

            # Download videos — supports both video_url (TempoGears upload portal)
            # and S3 paths via AWS CLI (legacy direct-upload clients)
            with open(csv_path) as f:
              rows = list(csv.DictReader(f))

            for row in rows:
              video_file = os.path.join(client_dir, row['video_file'])
              os.makedirs(os.path.dirname(video_file), exist_ok=True)

              video_url = row.get('video_url', '')
              if video_url and video_url.startswith('http'):
                print(f"Downloading {row['video_file']} from upload portal...")
                result = subprocess.run(['curl', '-sL', video_url, '-o', video_file])
                if result.returncode != 0:
                  print(f"ERROR: failed to download {row['video_file']}", file=sys.stderr)
                  sys.exit(1)
              else:
                print(f"Skipping download for {row['video_file']} — no video_url (expected in S3)")

            print(f"\nScheduling posts for {client_name}...")
            subprocess.run(['tg', 'bulk-schedule', csv_path, '--dry-run'], check=True)
            if os.environ.get('GITHUB_REF') == 'refs/heads/main':
              subprocess.run(['tg', 'bulk-schedule', csv_path], check=True)
              print(f"✓ Scheduled: {client_name}")
            else:
              print(f"✓ Dry run complete — posts will be scheduled when this branch is merged to main")

          PYEOF
